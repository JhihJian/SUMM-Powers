# Example agent-orchestrator.yaml for dev-loop workflow
# Place this in your project root as agent-orchestrator.yaml
# Adjust values for your project

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers:
    - desktop  # Add slack/discord/webhook for team notifications

projects:
  my-project:
    repo: owner/my-project
    path: ~/my-project
    defaultBranch: main

    # dev-loop agent rules — applied to all spawned sessions (master and workers)
    agentRules: |
      You have SUMM. You MUST use the Skill tool to load skills before doing any work.

      ## If you are a MASTER agent (coordinator):
      1. Load skill summ:dev-loop immediately
      2. Follow the dev-loop state machine exactly
      3. You NEVER write code — dispatch workers via `ao spawn`
      4. Use `ao status` to monitor workers, `ao send` to communicate
      5. Escalate to human when loop count >= 3 or blocked

      ## If you are a WORKER agent (executor):
      1. Load the skill specified in your task prompt IMMEDIATELY
      2. Follow the skill's instructions exactly
      3. Work ONLY on the task assigned to you
      4. Do not attempt architectural decisions — escalate
      5. Report using the format: Status / Implementation / Tests / Files / Self-review

    # Reactions for automated triggering (future use)
    # Uncomment when ready for automated workflow triggers
